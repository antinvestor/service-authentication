syntax = "proto3";

package partition.v1;

// -----------------------------------------------------
// Core notes (normative):
// - Partition Service provides multi-tenancy and data isolation
// - Tenants contain hierarchical partitions for organizational structure
// - Role-based access control (RBAC) with partition and access roles
// - Custom pages for partition-specific UI customization
// - Profile-based access grants with role assignments
// - All timestamps are RFC3339 / google.protobuf.Timestamp
// -----------------------------------------------------

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "common/v1/permissions.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/antinvestor/apis/go/partition/v1;partitionv1";
option java_multiple_files = true;
option java_package = "partitionv1";
option (gnostic.openapi.v3.document) = {
  info: {
    title: "Partition Service"
    version: "v1.0.0"
    description: "The Partition Service provides multi-tenancy and data isolation capabilities with hierarchical partitions, role-based access control (RBAC), and custom UI pages. Tenants represent top-level organizational units containing hierarchical partitions for departments, projects, or teams. The service supports fine-grained access control through partition roles and access grants, enabling secure multi-tenant applications with customizable user experiences."
    contact: {
      name: "Ant Investor Ltd"
      url: "https://github.com/antinvestor/service-partition"
      email: "info@antinvestor.com"
    }
    license: {
      name: "Apache License"
      url: "https://github.com/antinvestor/apis/blob/master/LICENSE"
    }
  }
  components: {
    security_schemes: {
      additional_properties: [
        {
          name: "BearerAuth"
          value: {
            security_scheme: {
              type: "http"
              scheme: "bearer"
              bearer_format: "JWT"
            }
          }
        }
      ]
    }
  }
};

// -----------------------------------------------------
// Core Data Types
// -----------------------------------------------------

// TenantEnvironment identifies the deployment environment a tenant belongs to.
enum TenantEnvironment {
  TENANT_ENVIRONMENT_UNSPECIFIED = 0;
  TENANT_ENVIRONMENT_PRODUCTION = 1;
  TENANT_ENVIRONMENT_STAGING = 2;
}

// TenantObject represents a top-level organizational unit.
message TenantObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique tenant ID
  string name = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 100
  ]; // Tenant name (organization, company)
  string description = 3 [(buf.validate.field).string.max_len = 500]; // Tenant description
  google.protobuf.Struct properties = 4; // Additional tenant metadata
  google.protobuf.Timestamp created_at = 5; // Creation timestamp
  common.v1.STATE state = 6; // Tenant state
  TenantEnvironment environment = 7 [(buf.validate.field).enum.defined_only = true]; // Deployment environment
}

// PartitionObject represents a data partition within a tenant.
message PartitionObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique partition ID
  string name = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 100
  ]; // Partition name (department, project, team)
  string tenant_id = 3 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Parent tenant ID
  string parent_id = 4 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Parent partition ID for hierarchical structure (empty for root partitions)
  string description = 5 [(buf.validate.field).string.max_len = 500]; // Partition description
  common.v1.STATE state = 6; // Partition state
  google.protobuf.Struct properties = 7; // Additional partition metadata
  google.protobuf.Timestamp created_at = 8; // Creation timestamp
  string domain = 9 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.max_len = 255
  ]; // Custom domain for the partition (unique across all partitions)
}

// PartitionRoleObject represents a role within a partition.
message PartitionRoleObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique role ID
  string partition_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Associated partition ID
  string name = 3 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 100
  ]; // Role name (admin, editor, viewer, etc.)
  google.protobuf.Struct properties = 4; // Role permissions and metadata
  google.protobuf.Timestamp created_at = 5; // Creation timestamp
  common.v1.STATE state = 6; // Role state
}

// PageObject represents a custom UI page for a partition.
message PageObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique page ID
  string name = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 100
  ]; // Page name
  string html = 3 [
    (buf.validate.field).string.min_len = 4,
    (buf.validate.field).string.max_len = 5000
  ]; // HTML content for the page
  common.v1.STATE state = 4; // Page state
  google.protobuf.Timestamp created_at = 5; // Creation timestamp
  google.protobuf.Struct properties = 6; // Additional page metadata
  string partition_id = 7 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Associated partition ID
}

// AccessObject represents a profile's access to a partition.
message AccessObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique access ID
  string profile_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Profile ID with access
  PartitionObject partition = 3; // Partition being accessed
  common.v1.STATE state = 4; // Access state
  google.protobuf.Timestamp created_at = 5; // Access grant timestamp
}

// AccessRoleObject links an access grant to a partition role.
message AccessRoleObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique access role ID
  string access_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Associated access ID
  PartitionRoleObject role = 3; // Assigned partition role
}

// ServiceAccountObject represents a pre-registered service account (bot) for a partition.
// Service accounts get a dedicated child partition with client_credentials grant type.
message ServiceAccountObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique service account ID
  string tenant_id = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Tenant ID
  string partition_id = 3 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Target partition ID the bot operates on
  string profile_id = 4 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Identity/subject of the service bot
  string client_id = 5 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Dedicated child partition ID (= Hydra client_id)
  common.v1.STATE state = 6; // Service account state
  repeated string audiences = 7; // Service namespaces the bot can access
  google.protobuf.Struct properties = 8; // Additional metadata
  google.protobuf.Timestamp created_at = 9; // Creation timestamp
  string type = 10 [
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    (buf.validate.field).string.in = "internal",
    (buf.validate.field).string.in = "external"
  ]; // Service account type: internal (service-to-service) or external (API consumers)
}

// ClientObject represents an OAuth2 client configuration.
// A client can be owned by either a partition (for user auth flows like PKCE)
// or a service account (for client_credentials machine-to-machine flows).
message ClientObject {
  string id = 1 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 40,
    (buf.validate.field).string.pattern = "[0-9a-z_-]{3,40}"
  ]; // Unique client record ID
  string name = 2 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 100
  ]; // Display name
  string client_id = 3 [
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 100
  ]; // OAuth2 client_id (= Hydra client identifier)
  string type = 4 [
    (buf.validate.field).string.in = "public",
    (buf.validate.field).string.in = "confidential",
    (buf.validate.field).string.in = "internal",
    (buf.validate.field).string.in = "external"
  ]; // Client type: public, confidential, internal, external
  repeated string grant_types = 5; // OAuth2 grant types (authorization_code, refresh_token, client_credentials)
  repeated string response_types = 6; // OAuth2 response types (code, token)
  repeated string redirect_uris = 7; // Allowed redirect URIs
  string scopes = 8; // Space-separated OAuth2 scopes
  repeated string audiences = 9; // Service namespaces the client can access
  repeated string roles = 10; // Permission role names for SA tokens
  google.protobuf.Struct properties = 11; // Additional metadata
  common.v1.STATE state = 12; // Client state
  google.protobuf.Timestamp created_at = 13; // Creation timestamp

  // Owner: the client belongs to either a partition or a service account.
  // Full objects are returned to avoid extra network round-trips.
  oneof owner {
    PartitionObject partition = 14; // Partition that owns this client (user auth flows)
    ServiceAccountObject service_account = 15; // Service account that owns this client (client_credentials flows)
  }
}

