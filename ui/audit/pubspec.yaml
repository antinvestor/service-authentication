name: antinvestor_ui_audit
description: >
  Audit trail UI library for Antinvestor. Browse, search, analyze audit entries
  with embeddable widgets for object-level and system-wide activity tracking.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  antinvestor_ui_core:
    path: ../../../common/ui_core
  antinvestor_api_audit:
    path: ../../sdk/dart/audit
  antinvestor_api_common: ^1.52.0
  connectrpc: ^1.0.0
  csv: ^8.0.0
  fixnum: ^1.1.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  protobuf: ^4.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
