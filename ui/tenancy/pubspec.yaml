name: antinvestor_ui_tenancy
description: >
  Tenancy management UI library for Antinvestor. Tenants, partitions, roles,
  access control, service accounts, and permission management.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  antinvestor_ui_core:
    path: ../../../common/ui_core
  antinvestor_ui_profile:
    path: ../../../service-profile/ui/profile
  antinvestor_api_tenancy: ^1.54.0
  antinvestor_api_common: ^1.52.0
  antinvestor_api_profile: ^1.52.0
  connectrpc: ^1.0.0
  fl_chart: ^0.71.0
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  intl: ^0.19.0
  protobuf: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
