    post:
      tags:
        - Access
        - tenancy.v1.TenancyService
      summary: Create access grant
      description: Grants a profile access to a partition. The profile can then be assigned roles via CreateAccessRole.
      operationId: createAccess
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tenancy.v1.CreateAccessRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tenancy.v1.CreateAccessResponse'
